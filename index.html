<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Henna ❤️</title>

<style>
body {
margin: 0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg, #ffdde1, #ee9ca7, #ffd1dc);
overflow-x: hidden;
}

/* floating animation */
@keyframes floatUp {
0% {transform: translateY(0); opacity: 1;}
100% {transform: translateY(-100vh); opacity: 0;}
}

.container {
max-width: 850px;
margin: 60px auto;
padding: 25px;
text-align: center;
background: rgba(255,255,255,0.3);
border-radius: 25px;
}

h1 { color:#ff3d6e; }

.gallery {
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.gallery img {
width:100%;
border-radius:15px;
}

button {
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff4d6d;
color:white;
border-radius:25px;
cursor:pointer;
}

#secret { display:none; margin-top:15px; }

@media(max-width:768px){
.gallery{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:480px){
.gallery{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<audio id="bgmusic" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="container">
<h1>Happy Birthday Henna ❤️</h1>

<div id="typing"></div>

<div class="gallery">
<img src="photo1.jpeg">
<img src="photo2.jpeg">
<img src="photo3.jpeg">
</div>

<button id="playBtn">Tap this 💌</button>

<div id="secret">I love you more every day. — Ayan ❤️</div>
</div>

<script>

const message = `MY HZU,

I cant imagine spending a single day without you, ik we have our ups and downs but ever since we've met i love life, everything about you feels so unreal that sometimes i question that even if ur real or not, your love makes me feel the emotions i never knew existed...

Forever yours,
Ayandu ❤️`;

let i = 0;

function typeWriter(){
if(i < message.length){
document.getElementById("typing").innerHTML += message.charAt(i);
i++;
setTimeout(typeWriter,35);
}
}

typeWriter();

/* button + music */
document.getElementById("playBtn").addEventListener("click", function(){
document.getElementById("bgmusic").play();
document.getElementById("secret").style.display = "block";
});

/* 💖✨ hearts + glitter */
setInterval(()=>{
let el = document.createElement("div");

let shapes = ["💖","💗","💘","✨"];
el.innerHTML = shapes[Math.floor(Math.random()*shapes.length)];

el.style.position = "fixed";
el.style.left = Math.random()*100 + "vw";
el.style.bottom = "0";
el.style.fontSize = (Math.random()*15 + 15) + "px";
el.style.opacity = Math.random();
el.style.animation = "floatUp 5s linear forwards";

document.body.appendChild(el);

setTimeout(()=>el.remove(),5000);

},300);

</script>

</body>
</html>
