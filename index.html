<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Henna ❤️</title>

<style>
body {
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#ffdde1,#ee9ca7,#ffd1dc);
overflow-x:hidden;

/* FIXED CURSOR */
cursor: url('heart.png') 16 16, auto;
}

/* 🌙 DARK MODE */
.dark {
background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
color:white;
}

/* intro */
#intro {
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background: linear-gradient(135deg,#ffdde1,#ee9ca7);
z-index:999;
}

/* main */
.container {
max-width:850px;
margin:60px auto;
padding:25px;
text-align:center;
background:rgba(255,255,255,0.3);
border-radius:25px;
backdrop-filter:blur(10px);
display:none;
}

h1 { color:#ff3d6e; }

#typing {
font-size:18px;
line-height:1.8;
white-space:pre-line;
display:none;
}

/* 💌 letter button */
#letterBtn {
margin-top:20px;
}

/* gallery POLAROID */
.gallery {
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:20px;
}
.gallery img {
width:100%;
background:white;
padding:8px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transform:rotate(calc(-3deg + 6deg * var(--i)));
}

/* buttons */
button {
padding:10px 20px;
border:none;
background:#ff4d6d;
color:white;
border-radius:25px;
cursor:pointer;
margin:5px;
}

/* hearts */
@keyframes floatUp {
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

/* mini texts */
.mini {
position:fixed;
font-size:12px;
color:#ff4d6d;
opacity:0.6;
animation: floatUp 6s linear;
pointer-events:none;
}

/* popup */
#popup {
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
display:none;
z-index:1000;
}

/* toggle */
#toggle {
position:fixed;
top:10px;
right:10px;
}

</style>
</head>

<body>

<div id="intro">
<h2>Tap to open your birthday surprise 🎁</h2>
<button id="openBtn">Open 💖</button>
</div>

<audio id="bgmusic" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<button id="toggle">🌙</button>

<div class="container" id="mainContent">

<h1>Happy Birthday Henna ❤️</h1>

<button id="letterBtn">Read my letter 💌</button>

<div id="typing"></div>

<div class="gallery">
<img src="photo1.jpeg" style="--i:1">
<img src="photo2.jpeg" style="--i:2">
<img src="photo3.jpeg" style="--i:3">
</div>

<div>
<button id="playMusic">▶️</button>
<button id="pauseMusic">⏸️</button>
</div>

</div>

<div id="popup">I WILL ALWAYS BE URS ❤️</div>

<script>
window.onload=function(){

const message = `MY HZU,

I cant imagine spending a single day without you, ik we have our ups and downs but ever since we've met i love life...

Forever yours,
Ayandu ❤️`;

/* typewriter */
function typeWriter(){
let i=0;
let el=document.getElementById("typing");
el.textContent="";
el.style.display="block";

function step(){
if(i<message.length){
el.textContent+=message[i];
i++;
setTimeout(step,15);
}
}
step();
}

/* open */
openBtn.onclick=function(){
intro.style.display="none";
mainContent.style.display="block";
bgmusic.volume=0.2;
bgmusic.play();
};

/* open letter */
letterBtn.onclick=function(){
typeWriter();
};

/* music */
playMusic.onclick=()=>bgmusic.play();
pauseMusic.onclick=()=>bgmusic.pause();

/* toggle */
toggle.onclick=function(){
document.body.classList.toggle("dark");
};

/* floating mini texts */
setInterval(()=>{
let t=document.createElement("div");
t.className="mini";
t.innerText=["my girl 💗","forever us","I love you"][Math.floor(Math.random()*3)];
t.style.left=Math.random()*100+"vw";
t.style.bottom="-20px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),6000);
},1200);

/* heart burst click */
document.addEventListener("click", e=>{
for(let i=0;i<6;i++){
let h=document.createElement("div");
h.innerHTML="💖";
h.style.position="fixed";
h.style.left=e.clientX+"px";
h.style.top=e.clientY+"px";
h.style.fontSize="14px";
h.style.opacity=0.8;
h.style.animation="floatUp 1s linear";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1000);
}
});

/* popup */
setTimeout(()=>{
document.getElementById("popup").style.display="block";
},8000);

};
</script>

</body>
</html>
